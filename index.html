        function initElement(el) {
            let isDragging = false;
            let isResizing = false;
            let startX, startY, startW, startH, startLeft, startTop;

            const textContentNode = el.querySelector('.text-content');
            if (textContentNode) {
                textContentNode.addEventListener('input', () => {
                    pushRealTimePreviewSync();
                });
                textContentNode.addEventListener('blur', () => { saveHistoryState(); });
            }

            el.addEventListener('pointerdown', (e) => {
                if (e.target.classList.contains('resize-handle')) {
                    isResizing = true;
                } else {
                    if (e.target.getAttribute('contenteditable') === 'true') return;
                    isDragging = true;
                }
                
                selectElement(el);
                startX = e.clientX;
                startY = e.clientY;
                startW = el.offsetWidth;
                startH = el.offsetHeight;
                startLeft = el.offsetLeft;
                startTop = el.offsetTop;
                
                el.setPointerCapture(e.pointerId);
                e.stopPropagation();
            });

            el.addEventListener('pointermove', (e) => {
                if (!isDragging && !isResizing) return;

                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                if (isResizing) {
                    el.style.width = Math.max(1, startW + dx) + 'px';
                    el.style.height = Math.max(1, startH + dy) + 'px';
                } else if (isDragging) {
                    el.style.left = (startLeft + dx) + 'px';
                    el.style.top = (startTop + dy) + 'px';
                    checkAlignmentGuides(el);
                }
                
                pushRealTimePreviewSync();
            });

            el.addEventListener('pointerup', (e) => {
                if (isDragging || isResizing) {
                    isDragging = false;
                    isResizing = false;
                    el.releasePointerCapture(e.pointerId);
                    
                    hideAllAlignmentGuides();
                    refreshLayersListPanel();
                    saveHistoryState();
                    pushRealTimePreviewSync();
                }
            });
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('active');
            selectedElement = el;
            if(selectedElement) {
                selectedElement.classList.add('active');
                document.getElementById('elOpacity').value = selectedElement.style.opacity || 1;
                
                const imgNode = selectedElement.querySelector('img');
                if (imgNode) {
                    document.getElementById('imgPanX').value = selectedElement.getAttribute('data-pan-x') || 50;
                    document.getElementById('imgPanY').value = selectedElement.getAttribute('data-pan-y') || 50;
                } else {
                    const style = window.getComputedStyle(selectedElement);
                    document.getElementById('fontSize').value = parseInt(style.fontSize);
                    document.getElementById('fontFamily').value = style.fontFamily.replace(/['"]/g, '').split(',')[0];
                    
                    let rgb = style.color;
                    if(rgb.includes('rgb')) {
                        let values = rgb.match(/\d+/g);
                        let hex = "#" + ((1 << 24) + (parseInt(values[0]) << 16) + (parseInt(values[1]) << 8) + parseInt(values[2])).toString(16).slice(1);
                        document.getElementById('fontColor').value = hex;
                    }
                }
            }
            highlightActiveLayerRow();
        }

        function applySpanStyle(styleProperty, styleValue) {
            if (!selectedElement || selectedElement.querySelector('img')) return;

            const editableNode = selectedElement.querySelector('.text-content');
            if (editableNode) editableNode.focus();

            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) {
                selectedElement.style[styleProperty] = styleValue;
                setTimeout(() => { saveHistoryState(); pushRealTimePreviewSync(); }, 100);
                return;
            }

            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.style[styleProperty] = styleValue;

            try {
                range.surroundContents(span);
            } catch (e) {
                document.execCommand('styleWithCSS', false, true);
                if (styleProperty === 'fontFamily') document.execCommand('fontName', false, styleValue);
                if (styleProperty === 'fontSize') document.execCommand('fontSize', false, 7);
                if (styleProperty === 'color') document.execCommand('foreColor', false, styleValue);
                if (styleProperty === 'fontSize') {
                    const fontElements = editableNode.getElementsByTagName('font');
                    for (let fontEl of fontElements) {
                        if (fontEl.size === "7") {
                            fontEl.removeAttribute("size");
                            fontEl.style.fontSize = styleValue;
                        }
                    }
                }
            }
            
            selection.removeAllRanges();
            selection.addRange(range);
            
            setTimeout(() => { saveHistoryState(); pushRealTimePreviewSync(); }, 100);
        }

        function updateTextAlignment(alignValue) {
            if (!selectedElement || selectedElement.querySelector('img')) return;
            selectedElement.style.textAlign = alignValue;
            const textContentNode = selectedElement.querySelector('.text-content');
            if (textContentNode) textContentNode.style.textAlign = alignValue;
            saveHistoryState();
            pushRealTimePreviewSync();
        }

        function updateElementOpacity(val) {
            if (!selectedElement) return;
            selectedElement.style.opacity = val;
        }

        function applyImageFrameShape(shapeType) {
            if (!selectedElement || !selectedElement.querySelector('img')) return;
            selectedElement.setAttribute('data-shape', shapeType);

            if (shapeType === 'circle') { selectedElement.style.borderRadius = '50%'; } 
            else if (shapeType === 'rounded') { selectedElement.style.borderRadius = '12px'; } 
            else { selectedElement.style.borderRadius = '0px'; }
            saveHistoryState();
            pushRealTimePreviewSync();
        }

        function updateImagePanningCoords() {
            if (!selectedElement) return;
            const imgNode = selectedElement.querySelector('img');
            if (!imgNode) return;

            const pxVal = document.getElementById('imgPanX').value;
            const pyVal = document.getElementById('imgPanY').value;

            selectedElement.setAttribute('data-pan-x', pxVal);
            selectedElement.setAttribute('data-pan-y', pyVal);
            imgNode.style.objectPosition = `${pxVal}% ${pyVal}%`;
        }

        function execTextCmd(cmdName, argumentVal = null) {
            if (!selectedElement || selectedElement.querySelector('img')) return;
            const editableNode = selectedElement.querySelector('.text-content');
            if (editableNode) {
                editableNode.focus();
                document.execCommand(cmdName, false, argumentVal);
                setTimeout(() => { saveHistoryState(); pushRealTimePreviewSync(); }, 100);
            }
        }

        function deleteElement() {
            if (selectedElement) {
                selectedElement.remove();
                selectElement(null);
                refreshLayersListPanel();
                saveHistoryState();
                pushRealTimePreviewSync();
            }
        }

        card.addEventListener('pointerdown', (e) => {
            if (e.target === card || e.target === cardBg) {
                if (selectedElement) selectedElement.classList.remove('active');
                selectElement(null);
            }
        });

        function toggleLayersDrawer() {
            const drawerNode = document.getElementById('layers-drawer');
            drawerNode.classList.toggle('open');
            if(drawerNode.classList.contains('open')) refreshLayersListPanel();
        }

        function refreshLayersListPanel() {
            const listWrapper = document.getElementById('layers-list-items');
            listWrapper.innerHTML = '';
            
            const operationalElements = Array.from(card.querySelectorAll('.element'));
            if(operationalElements.length === 0) {
                listWrapper.innerHTML = `<p style="color:#64748b; font-style:italic; font-size:11px; text-align:center; margin-top:20px;">No elements</p>`;
                return;
            }

            operationalElements.slice().reverse().forEach((nodeInstance, reverseIndex) => {
                const originalIndex = operationalElements.length - 1 - reverseIndex;
                const imageLayerChecker = nodeInstance.querySelector('img');
                const dataType = nodeInstance.getAttribute('data-type');
                
                const rowItemNode = document.createElement('div');
                rowItemNode.className = 'layer-item';
                if(nodeInstance === selectedElement) rowItemNode.classList.add('active-layer');

                let content = '';
                let layerType = '[Text Layer]';
                if (dataType === 'qrcode') layerType = '[QR Code]';
                else if (dataType === 'barcode') layerType = '[Barcode]';
                else if (imageLayerChecker) layerType = '[Image Layer]';

                if (imageLayerChecker) {
                    content = `
                        <div class="layer-item-meta"><span style="font-weight:600; color:#334155;">${layerType}</span></div>
                        <div class="layer-item-actions" style="margin-top: 4px;">
                            ${dataType !== 'qrcode' && dataType !== 'barcode' ? `<button class="purple" style="padding:4px 8px; font-size:11px; border-radius:4px; flex:1;" onclick="event.stopPropagation(); triggerLayerImageReplace(${originalIndex})">Replace</button>` : ''}
                            <button class="danger" style="padding:4px 8px; font-size:11px; border-radius:4px;" onclick="event.stopPropagation(); deleteTargetedLayer(${originalIndex})">Delete</button>
                        </div>
                    `;
                } else {
                    const txtContentNode = nodeInstance.querySelector('.text-content');
                    const currentTextString = txtContentNode ? txtContentNode.innerText : '';
                    content = `
                        <div class="layer-item-meta"><span style="font-weight:600; color:#334155;">${layerType}</span></div>
                        <div style="margin-top:4px; width:100%;" onclick="event.stopPropagation();">
                            <input type="text" class="layer-edit-input" value="${currentTextString.replace(/"/g, '&quot;')}" oninput="updateTextFromLayerPanel(this, ${originalIndex})" onchange="saveHistoryState()" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation()" style="width:100%; font-size:12px; padding:5px; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:4px;">
                        </div>
                        <div class="layer-item-actions" style="margin-top: 2px;">
                            <button class="danger" style="padding:3px 8px; font-size:11px; border-radius:4px;" onclick="event.stopPropagation(); deleteTargetedLayer(${originalIndex})">Delete</button>
                        </div>
                    `;
                }
                rowItemNode.innerHTML = content;
                rowItemNode.onclick = () => selectElement(operationalElements[originalIndex]);
                listWrapper.appendChild(rowItemNode);
            });
        }
        
        function updateTextFromLayerPanel(inputElement, index) {
            const operationalElements = card.querySelectorAll('.element');
            const targetEl = operationalElements[index];
            if(targetEl) {
                const canvasTextNode = targetEl.querySelector('.text-content');
                if(canvasTextNode) canvasTextNode.innerText = inputElement.value;
                pushRealTimePreviewSync();
            }
        }

        function highlightActiveLayerRow() {
            const listWrapper = document.getElementById('layers-list-items');
            const visualRowItems = listWrapper.querySelectorAll('.layer-item');
            const operationalElements = Array.from(card.querySelectorAll('.element'));
            
            visualRowItems.forEach(row => row.classList.remove('active-layer'));
            if(!selectedElement) return;

            const trackingIndex = operationalElements.indexOf(selectedElement);
            if(trackingIndex !== -1) {
                const targetReverseRowOffset = operationalElements.length - 1 - trackingIndex;
                if(visualRowItems[targetReverseRowOffset]) visualRowItems[targetReverseRowOffset].classList.add('active-layer');
            }
        }

        function triggerLayerImageReplace(idx) {
            imageReplacementIndexTarget = idx;
            document.getElementById('replaceLayerImgInput').click();
        }

        function handleLayerImageReplacement(event) {
            if (imageReplacementIndexTarget === null) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const operationalElements = card.querySelectorAll('.element');
                const targetEl = operationalElements[imageReplacementIndexTarget];
                if (targetEl) {
                    const imgNode = targetEl.querySelector('img');
                    if (imgNode) {
                        imgNode.src = e.target.result;
                        saveHistoryState();
                        pushRealTimePreviewSync();
                    }
                }
                imageReplacementIndexTarget = null;
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function deleteTargetedLayer(idx) {
            const operationalElements = card.querySelectorAll('.element');
            if(operationalElements[idx]) {
                if(selectedElement === operationalElements[idx]) selectElement(null);
                operationalElements[idx].remove();
                refreshLayersListPanel();
                saveHistoryState();
                pushRealTimePreviewSync();
            }
        }

        function printCard() {
            generateHDCanvas(2, (printCanvas) => {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html><head><title>Print ID Card</title><style>
                        body { margin: 0; display: flex; justify-content: center; align-items: center; }
                        img { max-width: 100%; max-height: 100vh; }
                        @page { size: auto; margin: 20px; }
                    </style></head><body>
                        <img src="${printCanvas.toDataURL('image/png')}" />
                        <script>
                            window.onload = () => { window.print(); window.close(); };
                        <\/script>
                    </body></html>`);
                printWindow.document.close();
            });
        }

        function renderTemplatesList(templates) {
            const listGridWrapperNode = document.getElementById('templates-list');
            listGridWrapperNode.innerHTML = '';
            
            if (templates.length === 0) {
                listGridWrapperNode.innerHTML = '<p style="color: #64748b; font-style: italic; font-size: 13px;">No templates. Create one!</p>';
                return;
            }

            templates.forEach(blueprint => {
                const itemContainer = document.createElement('div');
                itemContainer.className = 'template-item';
                if (blueprint.published) itemContainer.classList.add('published');
                if (blueprint.uid === currentActiveTemplateUid) {
                    itemContainer.style.borderColor = 'var(--primary)';
                    itemContainer.style.background = '#eff6ff';
                }
                
                const fixedBoundWidth = 180;
                const scaleDownRatio = fixedBoundWidth / parseFloat(blueprint.dimensions.w);
                const calculatedFrameHeight = parseFloat(blueprint.dimensions.h) * scaleDownRatio;

                itemContainer.innerHTML = `
                    ${blueprint.published ? '<div class="published-badge">PUBLISHED</div>' : ''}
                    <div id="preview-box-container-${blueprint.uid}" class="preview-container-box" style="width:${fixedBoundWidth}px; height:${calculatedFrameHeight}px;" onclick="loadTemplateBlueprint(${blueprint.uid})"></div>
                    <div style="margin-top:10px; display:flex; flex-direction:column; gap:6px; width:${fixedBoundWidth}px;">
                        <span style="font-size:12px; font-weight:700; color:#0f172a; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${blueprint.label}">${blueprint.label}</span>
                        <div style="display:flex; gap:6px;">
                            <button onclick="loadTemplateBlueprint(${blueprint.uid})" style="padding:4px 8px; font-size:11px; flex:1;">Load</button>
                            ${!blueprint.published ? `<button class="danger" onclick="deleteTemplateBlueprint(event, ${blueprint.uid})" style="padding:4px 8px; font-size:11px;">Delete</button>` : ''}
                        </div>
                    </div>
                `;
                
                listGridWrapperNode.appendChild(itemContainer);
                
                const generatedBox = document.getElementById(`preview-box-container-${blueprint.uid}`);
                if (generatedBox) {
                    injectLiveMirrorCloneToBox(generatedBox, blueprint);
                }
            });
        }

        function loadTemplateBlueprint(uid) {
            const templates = JSON.parse(localStorage.getItem('app_id_card_blueprints_v2') || '[]');
            const targetingBlueprint = templates.find(b => b.uid === uid);
            if (!targetingBlueprint) return;

            // If published, load as copy (don't set currentActiveTemplateUid)
            if (targetingBlueprint.published) {
                currentActiveTemplateUid = null;
                applyStateBlueprintStr(JSON.stringify(targetingBlueprint));
                saveHistoryState(true);
                showFeedbackNotice(`Published template loaded. Save to create your own copy.`);
            } else {
                currentActiveTemplateUid = uid; 
                applyStateBlueprintStr(JSON.stringify(targetingBlueprint));
                saveHistoryState(true);
                showFeedbackNotice(`Template loaded: "${targetingBlueprint.label}"`);
            }
            
            loadTemplatesFromBackend();
        }

        async function deleteTemplateBlueprint(event, uid) {
            event.stopPropagation(); 
            if (!confirm("Delete this template?")) return;
            
            await sendToBackend('delete', { uid: uid });
            
            let blueprints = JSON.parse(localStorage.getItem('app_id_card_blueprints_v2') || '[]');
            blueprints = blueprints.filter(b => b.uid !== uid);
            localStorage.setItem('app_id_card_blueprints_v2', JSON.stringify(blueprints));
            
            if (currentActiveTemplateUid === uid) currentActiveTemplateUid = null;
            await loadTemplatesFromBackend();
        }
    </script>
</body>
</html>
