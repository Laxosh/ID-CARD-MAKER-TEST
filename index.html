<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise ID Card Designer Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- QR Code & Barcode Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --purple: #8b5cf6;
            --danger: #ef4444;
            --dark: #0f172a;
            --bg-canvas: #e2e8f0;
            --panel-border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-canvas);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            touch-action: manipulation;
        }

        /* Control Center Toolbar */
        .admin-panel {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 98%;
            justify-content: center;
            z-index: 100;
            border: 1px solid var(--panel-border);
        }

        .tool-section {
            border-right: 1px solid #e2e8f0;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-section:last-child { border: none; }
        .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        label { font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }

        button {
            padding: 8px 14px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button:hover { opacity: 0.95; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.secondary { background: #64748b; }
        button.success { background: var(--success); }
        button.purple { background: var(--purple); }
        button.danger { background: var(--danger); }
        button.dark { background: var(--dark); }
        button.icon-btn { padding: 6px 10px; font-weight: bold; font-size: 12px; }

        input, select, textarea {
            padding: 7px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #f8fafc;
            color: var(--dark);
            font-size: 13px;
        }
        input:focus, select:focus, textarea:focus { outline: 2px solid var(--primary); background: #ffffff; }
        input[type="range"] { padding: 0; cursor: pointer; height: 6px; }

        /* Toggle Switch Style */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: var(--success);
        }
        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        /* Editing Suite Canvas Layout */
        .canvas-area {
            position: relative;
            padding: 40px;
            background: #94a3b8;
            border-radius: 12px;
            overflow: auto;
            max-width: 95vw;
            display: flex;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }

        #id-card {
            width: 450px;
            height: 280px;
            background-color: transparent;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        #id-card-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }

        /* Dynamic Canvas Elements Layout */
        .element {
            position: absolute;
            min-width: 10px;
            min-height: 10px;
            cursor: move;
            user-select: none;
            border: 1px dashed transparent;
            padding: 6px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 5;
        }

        .element.image-element, .element.qr-element, .element.barcode-element {
            padding: 0 !important;
        }

        .element:hover { border-color: #2563eb; background: rgba(37, 99, 235, 0.03); }
        .element.active { border: 2px solid var(--primary); background: transparent; }

        .element img, .element canvas, .element svg {
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: block;
            object-fit: contain;
        }

        .text-content {
            outline: none;
            width: 100%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* Transforming Vector Framework Nodes */
        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--primary);
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
            display: none;
            z-index: 10;
            border-radius: 50%;
            border: 2px solid white;
        }
        .element.active .resize-handle { display: block; }

        /* Advanced Alignment Guides */
        .alignment-guide {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        .alignment-guide.vertical {
            width: 1px;
            top: 0;
            bottom: 0;
            background: #ef4444;
            box-shadow: 0 0 3px rgba(239, 68, 68, 0.5);
        }
        .alignment-guide.horizontal {
            height: 1px;
            left: 0;
            right: 0;
            background: #ef4444;
            box-shadow: 0 0 3px rgba(239, 68, 68, 0.5);
        }

        /* NEW: Edit Form Panel */
        #edit-form-panel {
            display: none;
            margin-top: 30px;
            width: 100%;
            max-width: 98%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid var(--primary);
        }

        #edit-form-panel h3 {
            margin-top: 0;
            color: var(--dark);
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .form-field {
            margin-bottom: 15px;
        }

        .form-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        .form-field input, .form-field textarea {
            width: 100%;
            box-sizing: border-box;
        }

        .form-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* NEW: Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            margin-top: 0;
            color: var(--dark);
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Component Layer Control Drawer System */
        .drawer-panel {
            position: fixed;
            top: 0;
            right: -340px;
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--panel-border);
        }
        .drawer-panel.open { right: 0; }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .drawer-header h3 { margin: 0; color: var(--dark); font-size: 15px; font-weight: 700; }
        .close-btn { background: none; color: #64748b; font-size: 22px; padding: 0; border: none; cursor: pointer; }
        
        .layers-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .layer-item {
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.15s ease;
        }
        .layer-item:hover { background: #f1f5f9; }
        .layer-item.active-layer { background: #eff6ff; border-color: var(--primary); }
        .layer-item-meta { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .layer-item-actions { display: flex; gap: 6px; justify-content: flex-end; width: 100%; }

        /* Blueprint Storage Dashboard Layout */
        .templates-section {
            margin-top: 40px;
            width: 100%;
            max-width: 98%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            box-sizing: border-box;
            border: 1px solid var(--panel-border);
        }

        .templates-section h2 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .templates-grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: flex-start; }

        .template-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8fafc;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
            position: relative;
        }
        .template-item:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

        .template-item.published {
            border: 2px solid var(--success);
            background: #f0fdf4;
        }

        .template-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--success);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .preview-container-box {
            position: relative;
            overflow: hidden;
            background: #cbd5e1;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Micro HTML Layout Reflection Engine System Styles */
        .preview-scaled-mirror-root {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            pointer-events: none;
            user-select: none;
        }
        .preview-scaled-mirror-root .element {
            border: none !important;
            background: transparent !important;
        }
        .preview-scaled-mirror-root .image-element, .preview-scaled-mirror-root .qr-element, .preview-scaled-mirror-root .barcode-element {
            padding: 0 !important;
        }
        .preview-scaled-mirror-root .resize-handle {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="tool-section">
            <label>Workspace Save Management</label>
            <div class="row">
                <button class="success" onclick="saveActiveWorkspaceChanges()" style="font-weight: bold;" title="Update active template (Ctrl + S)">💾 Save</button>
                <button class="purple" onclick="createNewTemplateBlueprint()" style="font-weight: bold;" title="Save as new template">📋 Save As</button>
                <button style="background: #f59e0b;" onclick="openNewCard()" title="Start a new blank card">🆕 New Card</button>
            </div>
            <div class="row" style="margin-top: 2px;">
                <button class="secondary icon-btn" onclick="undoWorkspaceAction()" title="Undo">⟲</button>
                <button class="secondary icon-btn" onclick="redoWorkspaceAction()" title="Redo">⟳</button>
            </div>
        </div>

        <div class="tool-section">
            <label>Card Formats Matrix</label>
            <div class="row">
                <button class="secondary" onclick="setOrientation('landscape')">Landscape</button>
                <button class="secondary" onclick="setOrientation('portrait')">Vertical</button>
            </div>
            <div class="row">
                W: <input type="number" id="cardW" value="450" style="width:52px" onchange="updateCardSize(); saveHistoryState(); pushRealTimePreviewSync();">
                H: <input type="number" id="cardH" value="280" style="width:52px" onchange="updateCardSize(); saveHistoryState(); pushRealTimePreviewSync();">
            </div>
        </div>

        <div class="tool-section">
            <label>Background Space</label>
            <div class="row">
                <button onclick="document.getElementById('bgInput').click()">Set Image</button>
                <button class="danger" onclick="removeBackground()">Clear</button>
                <input type="color" id="bgColor" value="#ffffff" onchange="updateBgColor(this.value)">
            </div>
            <div class="row">
                <label style="font-weight:normal; text-transform:none;">Bg Opacity:</label>
                <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="1" style="width:65px" oninput="updateBgOpacity(this.value); pushRealTimePreviewSync();" onchange="saveHistoryState()">
            </div>
            <input type="file" id="bgInput" hidden accept="image/*" onchange="handleBgUpload(event)">
        </div>

        <div class="tool-section">
            <label>Add Dynamic Elements</label>
            <div class="row">
                <button onclick="addText()">+ Text</button>
                <button onclick="document.getElementById('imgInput').click()">+ Image</button>
            </div>
            <div class="row" style="margin-top: 2px;">
                <button class="purple" onclick="openQRCodeModal()">+ QR Code</button>
                <button class="purple" onclick="openBarcodeModal()">+ Barcode</button>
            </div>
            <input type="file" id="imgInput" hidden accept="image/*" onchange="handleImageUpload(event)">
        </div>

        <div class="tool-section">
            <label>Text Customization Parameters</label>
            <div class="row">
                <select id="fontFamily" onchange="applySpanStyle('fontFamily', this.value)" style="width:115px;">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Impact">Impact</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Roboto">Roboto</option>
                    <option value="Open Sans">Open Sans</option>
                    <option value="Lato">Lato</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Oswald">Oswald</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Quicksand">Quicksand</option>
                    <option value="Ubuntu">Ubuntu</option>
                </select>
                <input type="number" id="fontSize" value="18" style="width:45px" onchange="applySpanStyle('fontSize', this.value + 'px')">
                <input type="color" id="fontColor" value="#000000" onchange="applySpanStyle('color', this.value)">
            </div>
            <div class="row">
                <button class="secondary icon-btn" onclick="updateTextAlignment('left')" title="Align Left">←</button>
                <button class="secondary icon-btn" onclick="updateTextAlignment('center')" title="Align Center">↔</button>
                <button class="secondary icon-btn" onclick="updateTextAlignment('right')" title="Align Right">→</button>
                <button class="secondary icon-btn" onclick="execTextCmd('bold')" title="Bold">B</button>
                <button class="secondary icon-btn" style="font-style:italic;" onclick="execTextCmd('italic')" title="Italic">I</button>
                <button class="secondary icon-btn" style="text-decoration:underline;" onclick="execTextCmd('underline')" title="Underline">U</button>
            </div>
        </div>

        <div class="tool-section">
            <label>Image Mask Frames & Panning</label>
            <div class="row">
                <button class="secondary" onclick="applyImageFrameShape('square')">Square</button>
                <button class="secondary" onclick="applyImageFrameShape('rounded')">Rounded</button>
                <button class="secondary" onclick="applyImageFrameShape('circle')">Circle</button>
            </div>
            <div class="row" style="margin-top: 2px; gap: 4px;">
                <div style="display:flex; flex-direction:column; gap:1px;">
                    <span style="font-size:9px; font-weight:bold; color:#64748b;">PAN X:</span>
                    <input type="range" id="imgPanX" min="0" max="100" value="50" style="width:55px;" oninput="updateImagePanningCoords(); pushRealTimePreviewSync();" onchange="saveHistoryState()">
                </div>
                <div style="display:flex; flex-direction:column; gap:1px;">
                    <span style="font-size:9px; font-weight:bold; color:#64748b;">PAN Y:</span>
                    <input type="range" id="imgPanY" min="0" max="100" value="50" style="width:55px;" oninput="updateImagePanningCoords(); pushRealTimePreviewSync();" onchange="saveHistoryState()">
                </div>
                <div style="display:flex; flex-direction:column; gap:1px;">
                    <span style="font-size:9px; font-weight:bold; color:#64748b;">OPACITY:</span>
                    <input type="range" id="elOpacity" min="0" max="1" step="0.05" value="1" style="width:55px;" oninput="updateElementOpacity(this.value); pushRealTimePreviewSync();" onchange="saveHistoryState()">
                </div>
            </div>
        </div>

        <div class="tool-section">
            <label>Element Controls</label>
            <div class="row">
                <button class="success" onclick="copyElement()" title="Copy (Ctrl+C)">📄 Copy</button>
                <button class="purple" onclick="pasteElement()" title="Paste (Ctrl+V)">📋 Paste</button>
                <button class="danger" onclick="deleteElement()" title="Delete (Del)">🗑️ Delete</button>
            </div>
            <div class="row" style="margin-top: 4px; align-items: center;">
                <label style="font-weight:normal; text-transform:none; margin: 0;">Smart Guides:</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="alignmentToggle" checked onchange="toggleAlignmentGuides()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="tool-section">
            <label>Cloud & Sharing</label>
            <div class="row">
                <button style="background: #10b981;" onclick="publishIDCard()" title="Publish to cloud">🌐 Publish</button>
                <button style="background: #3b82f6;" onclick="shareIDCard()" title="Generate share link">🔗 Share</button>
            </div>
        </div>

        <div class="tool-section">
            <label>Production Output</label>
            <div class="row">
                <button class="success" onclick="downloadHDCard()">Download HD PNG</button>
                <button class="purple" onclick="printCard()">Print</button>
            </div>
            <div class="row">
                <button class="dark" onclick="toggleLayersDrawer()">Elements Panel</button>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="id-card">
            <div id="id-card-bg"></div>
            <div id="align-guide-v-center" class="alignment-guide vertical"></div>
            <div id="align-guide-h-center" class="alignment-guide horizontal"></div>
            <div id="align-guide-v-left" class="alignment-guide vertical"></div>
            <div id="align-guide-v-right" class="alignment-guide vertical"></div>
            <div id="align-guide-h-top" class="alignment-guide horizontal"></div>
            <div id="align-guide-h-bottom" class="alignment-guide horizontal"></div>
        </div>
    </div>

    <!-- NEW: Edit Form Panel for Shared Cards -->
    <div id="edit-form-panel">
        <h3>✏️ Edit Card Details</h3>
        <div id="edit-form-fields"></div>
        <button class="success" onclick="applyFormChanges()" style="margin-top: 15px;">Apply Changes</button>
    </div>

    <div id="layers-drawer" class="drawer-panel">
        <div class="drawer-header">
            <h3>Canvas Elements Layer Monitor</h3>
            <button class="close-btn" onclick="toggleLayersDrawer()">×</button>
        </div>
        <div id="layers-list-items" class="layers-list"></div>
    </div>

    <div class="templates-section">
        <h2>💾 My Templates & 🌐 Published Gallery</h2>
        <div id="templates-list" class="templates-grid"></div>
    </div>

    <!-- NEW: QR Code Modal -->
    <div id="qrCodeModal" class="modal">
        <div class="modal-content">
            <h3>Generate QR Code</h3>
            <label>Enter Data for QR Code:</label>
            <textarea id="qrCodeData" placeholder="Enter text, URL, or any data..." rows="4"></textarea>
            <div class="modal-buttons">
                <button class="secondary" onclick="closeQRCodeModal()">Cancel</button>
                <button class="success" onclick="generateQRCode()">Generate</button>
            </div>
        </div>
    </div>

    <!-- NEW: Barcode Modal -->
    <div id="barcodeModal" class="modal">
        <div class="modal-content">
            <h3>Generate Barcode</h3>
            <label>Enter Data for Barcode:</label>
            <input type="text" id="barcodeData" placeholder="Enter barcode data (numbers/text)">
            <label>Barcode Type:</label>
            <select id="barcodeType">
                <option value="CODE128">CODE128 (Default)</option>
                <option value="CODE39">CODE39</option>
                <option value="EAN13">EAN13 (13 digits)</option>
                <option value="UPC">UPC (12 digits)</option>
                <option value="ITF14">ITF14 (14 digits)</option>
            </select>
            <div class="modal-buttons">
                <button class="secondary" onclick="closeBarcodeModal()">Cancel</button>
                <button class="success" onclick="generateBarcode()">Generate</button>
            </div>
        </div>
    </div>

    <input type="file" id="replaceLayerImgInput" hidden accept="image/*" onchange="handleLayerImageReplacement(event)">

    <script>

            const elements = card.querySelectorAll('.element');
            let fieldIndex = 0;
            
            elements.forEach((el, idx) => {
                const imgNode = el.querySelector('img');
                const isImage = !!imgNode && !el.classList.contains('qr-element') && !el.classList.contains('barcode-element');
                const isText = el.querySelector('.text-content');
                
                if (isText) {
                    const textContent = isText.innerText;
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'form-field';
                    fieldDiv.innerHTML = `
                        <label>Text Field ${fieldIndex + 1}:</label>
                        <input type="text" data-element-index="${idx}" data-field-type="text" value="${textContent.replace(/"/g, '&quot;')}">
                    `;
                    formContainer.appendChild(fieldDiv);
                    fieldIndex++;
                } else if (isImage) {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'form-field';
                    fieldDiv.innerHTML = `
                        <label>Image Field ${fieldIndex + 1}:</label>
                        <input type="file" data-element-index="${idx}" data-field-type="image" accept="image/*">
                    `;
                    formContainer.appendChild(fieldDiv);
                    fieldIndex++;
                }
            });
        }

        function applyFormChanges() {
            const formFields = document.querySelectorAll('#edit-form-fields input');
            const elements = card.querySelectorAll('.element');
            
            formFields.forEach(field => {
                const idx = parseInt(field.getAttribute('data-element-index'));
                const type = field.getAttribute('data-field-type');
                
                if (type === 'text' && field.value) {
                    const textContent = elements[idx].querySelector('.text-content');
                    if (textContent) {
                        textContent.innerText = field.value;
                    }
                } else if (type === 'image' && field.files && field.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const imgNode = elements[idx].querySelector('img');
                        if (imgNode) {
                            imgNode.src = e.target.result;
                        }
                    };
                    reader.readAsDataURL(field.files[0]);
                }
            });
            
            saveHistoryState();
            showFeedbackNotice("Changes applied! You can now download your customized card.");
        }

        function copyElement() {
            if (!selectedElement) {
                showFeedbackNotice("No element selected to copy.");
                return;
            }

            const imgNode = selectedElement.querySelector('img');
            const isImgType = !!imgNode;
            const style = window.getComputedStyle(selectedElement);

            let elementType = 'text';
            if (selectedElement.classList.contains('qr-element')) elementType = 'qr';
            else if (selectedElement.classList.contains('barcode-element')) elementType = 'barcode';
            else if (isImgType) elementType = 'image';

            copiedElementData = {
                type: elementType,
                innerPayload: isImgType ? imgNode.src : (selectedElement.querySelector('.text-content')?.innerHTML || ''),
                left: selectedElement.style.left,
                top: selectedElement.style.top,
                width: selectedElement.style.width,
                height: selectedElement.style.height,
                baseFontFamily: style.fontFamily,
                baseFontSize: style.fontSize,
                baseColor: style.color,
                opacity: selectedElement.style.opacity || '1',
                borderRadius: selectedElement.style.borderRadius || '0px',
                textAlign: selectedElement.style.textAlign || 'center',
                shape: selectedElement.getAttribute('data-shape') || 'square',
                panX: selectedElement.getAttribute('data-pan-x') || '50',
                panY: selectedElement.getAttribute('data-pan-y') || '50',
                qrData: selectedElement.getAttribute('data-qr-data') || '',
                barcodeData: selectedElement.getAttribute('data-barcode-data') || '',
                barcodeType: selectedElement.getAttribute('data-barcode-type') || 'CODE128'
            };

            showFeedbackNotice("Element copied!");
        }

        function pasteElement() {
            if (!copiedElementData) {
                showFeedbackNotice("No element to paste.");
                return;
            }

            const el = document.createElement('div');
            el.className = 'element';
            
            if (copiedElementData.type === 'qr') el.classList.add('qr-element');
            else if (copiedElementData.type === 'barcode') el.classList.add('barcode-element');
            else if (copiedElementData.type === 'image') el.classList.add('image-element');
            
            el.style.left = copiedElementData.left;
            el.style.top = copiedElementData.top;
            if (copiedElementData.width) el.style.width = copiedElementData.width;
            if (copiedElementData.height) el.style.height = copiedElementData.height;
            el.style.opacity = copiedElementData.opacity;
            el.style.borderRadius = copiedElementData.borderRadius;
            el.style.textAlign = copiedElementData.textAlign;
            el.setAttribute('data-shape', copiedElementData.shape);
            el.setAttribute('data-pan-x', copiedElementData.panX);
            el.setAttribute('data-pan-y', copiedElementData.panY);

            if (copiedElementData.type === 'text') {
                el.style.fontFamily = copiedElementData.baseFontFamily;
                el.style.fontSize = copiedElementData.baseFontSize;
                el.style.color = copiedElementData.baseColor;
                el.innerHTML = `
                    <div class="text-content" contenteditable="true" style="text-align: ${copiedElementData.textAlign};">${copiedElementData.innerPayload}</div>
                    <div class="resize-handle"></div>
                `;
            } else if (copiedElementData.type === 'qr') {
                el.setAttribute('data-qr-data', copiedElementData.qrData);
                el.innerHTML = `
                    <img src="${copiedElementData.innerPayload}" style="border-radius:0;" />
                    <div class="resize-handle"></div>
                `;
            } else if (copiedElementData.type === 'barcode') {
                el.setAttribute('data-barcode-data', copiedElementData.barcodeData);
                el.setAttribute('data-barcode-type', copiedElementData.barcodeType);
                el.innerHTML = `
                    <img src="${copiedElementData.innerPayload}" style="border-radius:0;" />
                    <div class="resize-handle"></div>

                    <div class="resize-handle"></div>
                `;
            }

            initElement(el);
            card.appendChild(el);
            selectElement(el);
            refreshLayersListPanel();
            saveHistoryState();
            pushRealTimePreviewSync();
            showFeedbackNotice("Element pasted!");

        function checkAlignmentGuides(draggedElement) {
            if (!alignmentGuidesEnabled) {
                hideAllAlignmentGuides();
                return;
            }

            const snapThreshold = 6;
            const cardWidth = card.offsetWidth;
            const cardHeight = card.offsetHeight;

            const draggedRect = {
                left: draggedElement.offsetLeft,
                top: draggedElement.offsetTop,
                right: draggedElement.offsetLeft + draggedElement.offsetWidth,
                bottom: draggedElement.offsetTop + draggedElement.offsetHeight,
                centerX: draggedElement.offsetLeft + draggedElement.offsetWidth / 2,
                centerY: draggedElement.offsetTop + draggedElement.offsetHeight / 2,
                width: draggedElement.offsetWidth,
                height: draggedElement.offsetHeight
            };

            const cardCenterX = cardWidth / 2;
            const cardCenterY = cardHeight / 2;

            let snappedX = null;
            let snappedY = null;
            let showVCenter = false, showHCenter = false;
            let showVLeft = false, showVRight = false, showHTop = false, showHBottom = false;

            if (Math.abs(draggedRect.centerX - cardCenterX) < snapThreshold) {
                snappedX = cardCenterX - draggedElement.offsetWidth / 2;
                showVCenter = true;
            }
            if (Math.abs(draggedRect.centerY - cardCenterY) < snapThreshold) {
                snappedY = cardCenterY - draggedElement.offsetHeight / 2;
                showHCenter = true;
            }

            const otherElements = Array.from(card.querySelectorAll('.element')).filter(el => el !== draggedElement);

            otherElements.forEach(otherEl => {
                const otherRect = {
                    left: otherEl.offsetLeft,
                    top: otherEl.offsetTop,
                    right: otherEl.offsetLeft + otherEl.offsetWidth,
                    bottom: otherEl.offsetTop + otherEl.offsetHeight,
                    centerX: otherEl.offsetLeft + otherEl.offsetWidth / 2,
                    centerY: otherEl.offsetTop + otherEl.offsetHeight / 2
                };

                if (Math.abs(draggedRect.left - otherRect.left) < snapThreshold) {
                    snappedX = otherRect.left;
                    showVLeft = true;
                    document.getElementById('align-guide-v-left').style.left = otherRect.left + 'px';
                }
                if (Math.abs(draggedRect.right - otherRect.right) < snapThreshold) {
                    snappedX = otherRect.right - draggedElement.offsetWidth;
                    showVRight = true;
                    document.getElementById('align-guide-v-right').style.left = otherRect.right + 'px';
                }
                if (Math.abs(draggedRect.centerX - otherRect.centerX) < snapThreshold) {
                    snappedX = otherRect.centerX - draggedElement.offsetWidth / 2;
                    showVCenter = true;
                    document.getElementById('align-guide-v-center').style.left = otherRect.centerX + 'px';
                }

                if (Math.abs(draggedRect.top - otherRect.top) < snapThreshold) {
                    snappedY = otherRect.top;
                    showHTop = true;
                    document.getElementById('align-guide-h-top').style.top = otherRect.top + 'px';
                }
                if (Math.abs(draggedRect.bottom - otherRect.bottom) < snapThreshold) {
                    snappedY = otherRect.bottom - draggedElement.offsetHeight;
                    showHBottom = true;
                    document.getElementById('align-guide-h-bottom').style.top = otherRect.bottom + 'px';
                }
                if (Math.abs(draggedRect.centerY - otherRect.centerY) < snapThreshold) {
                    snappedY = otherRect.centerY - draggedElement.offsetHeight / 2;
                    showHCenter = true;
                    document.getElementById('align-guide-h-center').style.top = otherRect.centerY + 'px';
                }
            });

            if (snappedX !== null) draggedElement.style.left = snappedX + 'px';
            if (snappedY !== null) draggedElement.style.top = snappedY + 'px';

            document.getElementById('align-guide-v-center').style.display = showVCenter ? 'block' : 'none';
            if (showVCenter && snappedX === null) document.getElementById('align-guide-v-center').style.left = cardCenterX + 'px';
            
            document.getElementById('align-guide-h-center').style.display = showHCenter ? 'block' : 'none';
            if (showHCenter && snappedY === null) document.getElementById('align-guide-h-center').style.top = cardCenterY + 'px';
            
            document.getElementById('align-guide-v-left').style.display = showVLeft ? 'block' : 'none';
            document.getElementById('align-guide-v-right').style.display = showVRight ? 'block' : 'none';
            document.getElementById('align-guide-h-top').style.display = showHTop ? 'block' : 'none';
            document.getElementById('align-guide-h-bottom').style.display = showHBottom ? 'block' : 'none';
        }

        function parseHTMLToSegments(htmlContent) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            
            const segments = [];
            
            function traverse(node, inheritedStyles = {}) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.textContent;
                    if (text) {
                        segments.push({
                            text: text,
                            ...inheritedStyles
                        });
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    const tagName = node.tagName.toLowerCase();
                    const newStyles = {...inheritedStyles};
                    
                    if (tagName === 'b' || tagName === 'strong') newStyles.bold = true;
                    if (tagName === 'i' || tagName === 'em') newStyles.italic = true;
                    if (tagName === 'u') newStyles.underline = true;
                    
                    const style = node.style;
                    if (style) {
                        if (style.fontWeight === 'bold') newStyles.bold = true;
                        if (style.fontWeight === 'normal') newStyles.bold = false;
                        if (style.fontStyle === 'italic') newStyles.italic = true;
                        if (style.fontStyle === 'normal') newStyles.italic = false;
                        if (style.textDecoration === 'underline') newStyles.underline = true;
                        
                        if (style.fontFamily) newStyles.fontFamily = style.fontFamily;
                        if (style.fontSize) newStyles.fontSize = style.fontSize;
                        if (style.color) newStyles.color = style.color;
                    }
                    
                    if (tagName === 'br') {
                        segments.push({ text: '\n' });
                    } else {
                        for (let child of node.childNodes) {
                            traverse(child, newStyles);
                        }
                    }
                }
            }
            
            traverse(tempDiv);
            return segments;
        }

        function pushRealTimePreviewSync() {
            if (currentActiveTemplateUid === null) return;
            
            let blueprintsCacheList = JSON.parse(localStorage.getItem('app_id_card_blueprints_v2') || '[]');

            if (idx !== -1) {
                blueprintsCacheList[idx].dimensions = {
                    w: document.getElementById('cardW').value,
                    h: document.getElementById('cardH').value
                };
                blueprintsCacheList[idx].backgroundStyles = {
                    color: cardBg.style.backgroundColor || 'white',
                    imageSource: cardBgImageData || 'none',
                    opacity: cardBg.style.opacity || '1'
                };
                blueprintsCacheList[idx].elementsDataset = parseCanvasElementsToArray();
                
                localStorage.setItem('app_id_card_blueprints_v2', JSON.stringify(blueprintsCacheList));
            }
        }

        function injectLiveMirrorCloneToBox(boxContainerNode, blueprintData) {
            boxContainerNode.innerHTML = '';
            
            const fixedBoundWidth = 180;
            const scaleDownRatio = fixedBoundWidth / parseFloat(blueprintData.dimensions.w);
            const calculatedFrameHeight = parseFloat(blueprintData.dimensions.h) * scaleDownRatio;
            
            boxContainerNode.style.width = fixedBoundWidth + 'px';
            boxContainerNode.style.height = calculatedFrameHeight + 'px';

            const mirrorShell = document.createElement('div');
            mirrorShell.className = 'preview-scaled-mirror-root';
            mirrorShell.style.width = blueprintData.dimensions.w + 'px';
            mirrorShell.style.height = blueprintData.dimensions.h + 'px';
            mirrorShell.style.transform = `scale(${scaleDownRatio})`;
            
            const mirrorBg = document.createElement('div');
            mirrorBg.style.position = 'absolute';
            mirrorBg.style.top = '0';
            mirrorBg.style.left = '0';
            mirrorBg.style.right = '0';
            mirrorBg.style.bottom = '0';
            mirrorBg.style.backgroundColor = blueprintData.backgroundStyles.color;
            if (blueprintData.backgroundStyles.imageSource !== 'none') {
                mirrorBg.style.backgroundImage = `url('${blueprintData.backgroundStyles.imageSource}')`;
                mirrorBg.style.backgroundSize = 'cover';
                mirrorBg.style.backgroundPosition = 'center';
            }

        function generateHDCanvas(scaleFactor, callback) {
            const priorSelectedElement = selectedElement;
            if (selectedElement) selectedElement.classList.remove('active');

            const origWidth = card.offsetWidth;
            const origHeight = card.offsetHeight;

            const canvas = document.createElement('canvas');
            canvas.width = origWidth * scaleFactor;
            canvas.height = origHeight * scaleFactor;
            
            const ctx = canvas.getContext('2d');
            ctx.scale(scaleFactor, scaleFactor);

            ctx.fillStyle = window.getComputedStyle(cardBg).backgroundColor || "#ffffff";
            ctx.fillRect(0, 0, origWidth, origHeight);

            const drawCardElements = () => {
                const elements = card.querySelectorAll('.element');
                let elementsToProcess = elements.length;

                if (elementsToProcess === 0) {
                    if (priorSelectedElement) priorSelectedElement.classList.add('active');
                    callback(canvas);
                    return;
                }
                
                const onElementDrawn = () => {
                    elementsToProcess--;
                    if (elementsToProcess === 0) {
                        if (priorSelectedElement) priorSelectedElement.classList.add('active');
                        callback(canvas);
                    }
                }

                elements.forEach(el => {
                    ctx.save();
                    ctx.globalAlpha = parseFloat(window.getComputedStyle(el).opacity || 1);

                    const x = el.offsetLeft;
                    const y = el.offsetTop;
                    const w = el.offsetWidth;
                    const h = el.offsetHeight;

                    const imgNode = el.querySelector('img');
                    if (imgNode) {
                        const shape = el.getAttribute('data-shape') || 'square';
                        const panX = parseFloat(el.getAttribute('data-pan-x') || 50);
                        const panY = parseFloat(el.getAttribute('data-pan-y') || 50);
                        
                        const tempImg = new Image();
                        tempImg.crossOrigin = "Anonymous";
                        tempImg.onload = () => {
                            ctx.save();
                            
                            ctx.beginPath();
                            if (shape === 'circle') {
                                ctx.arc(x + w/2, y + h/2, Math.min(w,h)/2, 0, Math.PI*2);
                            } else if (shape === 'rounded') {
                                const radius = parseFloat(window.getComputedStyle(el).borderRadius);
                                ctx.moveTo(x + radius, y);
                                ctx.lineTo(x + w - radius, y); ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
                                ctx.lineTo(x + w, y + h - radius); ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
                                ctx.lineTo(x + radius, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
                                ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
                            } else {
                                ctx.rect(x, y, w, h);
                            }
                            ctx.closePath();
                            ctx.clip();

                            // For QR/Barcode, use contain instead of cover
                            if (el.classList.contains('qr-element') || el.classList.contains('barcode-element')) {
                                ctx.drawImage(tempImg, x, y, w, h);
                            } else {
                                const imgRatio = tempImg.width / tempImg.height;
                                const elementRatio = w / h;
                                let sX = 0, sY = 0, sW = tempImg.width, sH = tempImg.height;

                                if (imgRatio > elementRatio) {
                                    sW = tempImg.height * elementRatio;
                                    sX = (tempImg.width - sW) * (panX / 100);
                                } else {
                                    sH = tempImg.width / elementRatio;
                                    sY = (tempImg.height - sH) * (panY / 100);
                                }

                                ctx.drawImage(tempImg, sX, sY, sW, sH, x, y, w, h);
                            }
                            
                            ctx.restore();
                            ctx.restore();
                            onElementDrawn();
                        };
                        tempImg.onerror = () => {
                           console.error("Could not load image:", imgNode.src);
                           onElementDrawn();
                        }
                        tempImg.src = imgNode.src;
                    } else {
                        const textContentNode = el.querySelector('.text-content');
                        const style = window.getComputedStyle(el);

                        const baseFontFamily = style.fontFamily;
                        const baseFontSize = parseInt(style.fontSize);
                        const baseColor = style.color;
                        
                        const alignment = style.textAlign || "center";
                        const paddingLeft = 6;
                        const paddingRight = 6;
                        const paddingTop = 6;
                        
                        const htmlContent = textContentNode.innerHTML;
                        const sanitizedHtml = htmlContent.replace(/<div>/g, '<br>').replace(/<\/div>/g, '').replace(/<p>/g, '<br>').replace(/<\/p>/g, '');
                        const lines = sanitizedHtml.split(/<br\s*\/?>/i);
                        
                        const computedLineHeightOffset = baseFontSize * 1.2;
                        let ongoingYOffset = y + paddingTop;

                        lines.forEach(lineHTML => {
                            const segments = parseHTMLToSegments(lineHTML);
                            if (segments.length === 0 && lineHTML === '') {
                                ongoingYOffset += computedLineHeightOffset;
                                return;
                            }
                            
                            let totalLineWidth = 0;
                            segments.forEach(seg => {
                                ctx.save();
                                const segFontSize = seg.fontSize ? parseInt(seg.fontSize) : baseFontSize;
                                const segFontFamily = seg.fontFamily || baseFontFamily;
                                const fontWeight = seg.bold ? 'bold' : 'normal';
                                const fontStyle = seg.italic ? 'italic' : 'normal';
                                ctx.font = `${fontStyle} ${fontWeight} ${segFontSize}px ${segFontFamily}`;
                                totalLineWidth += ctx.measureText(seg.text).width;
                                ctx.restore();
                            });

                            let currentX = x + paddingLeft;
                            if (alignment === "center") {
                                currentX = x + (w / 2) - (totalLineWidth / 2);
                            } else if (alignment === "right") {
                                currentX = x + w - paddingRight - totalLineWidth;
                            }

                            segments.forEach(seg => {
                                ctx.save();
                                
                                const segFontSize = seg.fontSize ? parseInt(seg.fontSize) : baseFontSize;
                                const segFontFamily = seg.fontFamily || baseFontFamily;
                                const segColor = seg.color || baseColor;
                                const fontWeight = seg.bold ? 'bold' : 'normal';
                                const fontStyle = seg.italic ? 'italic' : 'normal';
                                
                                ctx.fillStyle = segColor;
                                ctx.font = `${fontStyle} ${fontWeight} ${segFontSize}px ${segFontFamily}`;
                                ctx.textBaseline = "top";
                                ctx.textAlign = "left";
                                
                                ctx.fillText(seg.text, currentX, ongoingYOffset);
                                
                                if (seg.underline) {
                                    const textMetrics = ctx.measureText(seg.text);
                                    ctx.strokeStyle = segColor;
                                    ctx.lineWidth = Math.max(1, segFontSize / 14);
                                    ctx.beginPath();
                                    const underlineY = ongoingYOffset + segFontSize;
                                    ctx.moveTo(currentX, underlineY);
                                    ctx.lineTo(currentX + textMetrics.width, underlineY);
                                    ctx.stroke();
                                }
                                
                                currentX += ctx.measureText(seg.text).width;
                                ctx.restore();
                            });

                            ongoingYOffset += computedLineHeightOffset;
                        });

                        ctx.restore();
                        onElementDrawn();
                    }
                });
            };

            if (cardBgImageData) {
                const bgImg = new Image();
                bgImg.crossOrigin = "Anonymous";
                bgImg.onload = () => {
                    ctx.save();
                    ctx.globalAlpha = parseFloat(window.getComputedStyle(cardBg).opacity || 1);
                    ctx.drawImage(bgImg, 0, 0, origWidth, origHeight);
                    ctx.restore();
                    drawCardElements();
                };
                bgImg.onerror = () => {
                    console.error("Could not load background image");
                    drawCardElements();
                };
                bgImg.src = cardBgImageData;
            } else {
                drawCardElements();
            }
        }

        function parseCanvasElementsToArray() {
            const outputArray = [];
            const elementNodes = card.querySelectorAll('.element');
            
            elementNodes.forEach(el => {
                const imgNode = el.querySelector('img');
                const isImgType = !!imgNode;

                const style = window.getComputedStyle(el);
                
                let elementType = 'text';
                if (el.classList.contains('qr-element')) elementType = 'qr';
                else if (el.classList.contains('barcode-element')) elementType = 'barcode';
                else if (isImgType) elementType = 'image';
                
                outputArray.push({
                    type: elementType,
                    innerPayload: isImgType ? imgNode.src : (el.querySelector('.text-content')?.innerHTML || ''),
                    left: el.style.left,
                    top: el.style.top,
                    width: el.style.width,
                    height: el.style.height,
                    baseFontFamily: style.fontFamily,
                    baseFontSize: style.fontSize,
                    baseColor: style.color,
                    opacity: el.style.opacity || '1',
                    borderRadius: el.style.borderRadius || '0px',
                    textAlign: el.style.textAlign || 'center',
                    shape: el.getAttribute('data-shape') || 'square',
                    panX: el.getAttribute('data-pan-x') || '50',
                    panY: el.getAttribute('data-pan-y') || '50',
                    qrData: el.getAttribute('data-qr-data') || '',
                    barcodeData: el.getAttribute('data-barcode-data') || '',
                    barcodeType: el.getAttribute('data-barcode-type') || ''
                });
            });
            return outputArray;
        }

        function saveHistoryState(isInitRun = false) {
            const snapshotStr = compileCurrentStateBlueprint();
            if (undoStack.length > 0 && undoStack[undoStack.length - 1] === snapshotStr) return; 
            undoStack.push(snapshotStr);
            if (undoStack.length > 40) undoStack.shift(); 
            if (!isInitRun) redoStack = []; 
        }

        function undoWorkspaceAction() {
            if (undoStack.length <= 1) return; 
            const activeState = undoStack.pop();
            redoStack.push(activeState);
            applyStateBlueprintStr(undoStack[undoStack.length - 1]);
            pushRealTimePreviewSync();
        }

        function redoWorkspaceAction() {
            if (redoStack.length === 0) return;
            const targetStateStr = redoStack.pop();
            undoStack.push(targetStateStr);
            applyStateBlueprintStr(targetStateStr);
            pushRealTimePreviewSync();
        }

        function applyStateBlueprintStr(jsonStr) {
            if (!jsonStr) return;
            const blueprint = JSON.parse(jsonStr);

            document.getElementById('cardW').value = blueprint.dimensions.w;
            document.getElementById('cardH').value = blueprint.dimensions.h;
            updateCardSize();

            cardBg.style.backgroundColor = blueprint.backgroundStyles.color;
            cardBgImageData = blueprint.backgroundStyles.imageSource !== 'none' ? blueprint.backgroundStyles.imageSource : null;
            cardBg.style.backgroundImage = cardBgImageData ? `url('${cardBgImageData}')` : 'none';
            cardBg.style.opacity = blueprint.backgroundStyles.opacity;
            document.getElementById('bgOpacity').value = blueprint.backgroundStyles.opacity;
            
            if (blueprint.backgroundStyles.color.startsWith('#')) {
                document.getElementById('bgColor').value = blueprint.backgroundStyles.color;
            }

            card.querySelectorAll('.element').forEach(node => node.remove());
            selectedElement = null;

            blueprint.elementsDataset.forEach(compData => {
                const reconstructedNode = document.createElement('div');
                reconstructedNode.className = 'element';
                
                if (compData.type === 'qr') reconstructedNode.classList.add('qr-element');
                else if (compData.type === 'barcode') reconstructedNode.classList.add('barcode-element');
                else if (compData.type === 'image') reconstructedNode.classList.add('image-element');
                
                reconstructedNode.style.left = compData.left;
                reconstructedNode.style.top = compData.top;
                if (compData.width) reconstructedNode.style.width = compData.width;
                if (compData.height) reconstructedNode.style.height = compData.height;
                reconstructedNode.style.opacity = compData.opacity;
                reconstructedNode.style.borderRadius = compData.borderRadius || '0px';
                reconstructedNode.style.textAlign = compData.textAlign || 'center';
                reconstructedNode.setAttribute('data-shape', compData.shape || 'square');
                reconstructedNode.setAttribute('data-pan-x', compData.panX || '50');
                reconstructedNode.setAttribute('data-pan-y', compData.panY || '50');

                if (compData.type === 'text') {
                    reconstructedNode.style.fontFamily = compData.baseFontFamily;
                    reconstructedNode.style.fontSize = compData.baseFontSize;
                    reconstructedNode.style.color = compData.baseColor;
                    reconstructedNode.innerHTML = `
                        <div class="text-content" contenteditable="true" style="text-align: ${compData.textAlign || 'center'};">${compData.innerPayload}</div>
                        <div class="resize-handle"></div>
                    `;
                } else if (compData.type === 'qr') {
                    reconstructedNode.setAttribute('data-qr-data', compData.qrData);
                    reconstructedNode.innerHTML = `
                        <img src="${compData.innerPayload}" style="border-radius:0;" />
                        <div class="resize-handle"></div>
                    `;
                } else if (compData.type === 'barcode') {
                    reconstructedNode.setAttribute('data-barcode-data', compData.barcodeData);
                    reconstructedNode.setAttribute('data-barcode-type', compData.barcodeType);
                    reconstructedNode.innerHTML = `
                        <img src="${compData.innerPayload}" style="border-radius:0;" />
                        <div class="resize-handle"></div>
                    `;
                } else {
                    reconstructedNode.innerHTML = `
                        <img src="${compData.innerPayload}" style="border-radius:inherit; object-position: ${compData.panX || 50}% ${compData.panY || 50}%;" />
                        <div class="resize-handle"></div>
